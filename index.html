<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Station 13 | Riding Assignments</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600;700&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body class="board-page">
  <div class="page-shell">
    <main class="board-layout">
      <section class="riding-top-layout">
        <section class="riding-left-column">
          <section class="riding-left-stack">
            <section class="assignment-grid" id="assignmentGrid"></section>

            <section class="command-rail">
              <article class="apparatus-card command-card command-card--coordinator">
                <header class="apparatus-header">
                  <h2>Station Coordinator</h2>
                </header>
                <div class="seat-list">
                  <div class="seat-row seat-row--single">
                    <select class="seat-input" data-seat="station-coordinator" data-default="MacCormac, W.">
                    </select>
                  </div>
                </div>
              </article>

              <article class="apparatus-card command-card command-card--command">
                <header class="apparatus-header">
                  <h2>Command Vehicle</h2>
                </header>
                <div class="seat-list">
                  <div class="seat-row seat-row--single">
                    <select class="seat-input" data-seat="command-vehicle" data-default="Harris, M.">
                    </select>
                  </div>
                </div>
              </article>

              <article class="apparatus-card command-card command-card--secondary">
                <header class="apparatus-header">
                  <h2>13 Command 2</h2>
                </header>
                <div class="seat-list">
                  <div class="seat-row seat-row--single">
                    <select class="seat-input seat-input--empty" data-seat="command-2" data-default="Open Assignment">
                    </select>
                  </div>
                </div>
              </article>
            </section>
          </section>

          <article class="apparatus-card out-service-card">
            <header class="apparatus-header">
              <h2>Member Out of Service</h2>
            </header>
            <div class="out-service-table" id="outServiceTable"></div>
          </article>
        </section>

        <section class="board-calendar-stack" id="boardCalendarStack"></section>
      </section>
    </main>

    <nav class="board-bottom-nav" aria-label="Riding board pages">
      <a class="top-link" href="manage.html">Manage Site</a>
      <a class="top-link" href="staffing.html">Staffing Hours</a>
      <a class="top-link" href="weekly.html">Weekly Staffing</a>
      <a class="top-link" href="archived.html">Archived Hours</a>
      <a class="top-link" href="daily-crews.html">Daily Crews</a>
    </nav>
  </div>

  <script src="persistence.js"></script>
  <script src="data-store.js"></script>
  <script src="edit-lock.js"></script>
  <script src="combobox.js"></script>
  <script src="board.js"></script>
</body>
</html>
